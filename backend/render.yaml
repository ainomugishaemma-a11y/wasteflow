services:
  - type: web
    name: wasteflow-backend
    env: node
    buildCommand: npm install && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 15m
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        value: https://wasteflow-frontend.vercel.app
      - key: APP_URL
        value: https://wasteflow-backend.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: 10000
